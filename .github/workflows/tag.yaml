# Determine and tag a release from conventional commits.
name: Tag a Release
on:
  workflow_dispatch:
  schedule:
    - cron: "0 15 * * *" # Daily at 3 PM UTC.
jobs:
  tag:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      new-tag: ${{ steps.ccv.outputs.new-tag }}
      new-tag-version: ${{ steps.ccv.outputs.new-tag-version }}
      new-tag-version-type: ${{ steps.ccv.outputs.new-tag-version-type }}
      recently-tagged: ${{ steps.recent-tag.outputs.recently-tagged }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if there is a recent tag
        id: recent-tag
        if: github.event_name == 'schedule'
        run: |
          MAX_AGE=1209600 # 2 weeks
          TAG=$(git describe --tags --match 'v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null) || {
            echo "No matching tag; continue workflow."
            exit 0
          }
          TAG_TIME=$(git log -1 --format=%ct "$TAG")
          NOW=$(date +%s)
          AGE=$((NOW - TAG_TIME))
          echo "Latest tag: $TAG ($AGE seconds ago)"
          if [ "$AGE" -lt "$MAX_AGE" ]; then
            echo "recently-tagged=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Calculate next tag
        id: ccv
        uses: smlx/ccv@7318e2f25a52dcd550e75384b84983973251a1f8 # v0.10.0
        with:
          write-tag: false
      - name: Stamp embedded version and create tag
        if: steps.ccv.outputs.new-tag == 'true' && steps.ccv.outputs.new-tag-version-type != 'major' && steps.recent-tag.outputs.recently-tagged != 'true'
        env:
          TAG: ${{ steps.ccv.outputs.new-tag-version }}
        run: |
          printf 'package main\n\nconst Version = "%s"\n' "$TAG" > version.go
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add version.go
          git commit -m "Update version file to $TAG"
          git tag -a "$TAG" -m "$TAG"
          git push origin HEAD:master "$TAG"
  release:
    needs: tag
    uses: ./.github/workflows/release.yaml
    with:
      tag_name: ${{ needs.tag.outputs.new-tag-version }}
    secrets:
      publish_token: ${{ secrets.BCR_PUBLISH_TOKEN }}
    if: needs.tag.outputs.new-tag == 'true' && needs.tag.outputs.new-tag-version-type != 'major' && needs.tag.outputs.recently-tagged != 'true'
    permissions:
      contents: write
      id-token: write
      attestations: write
